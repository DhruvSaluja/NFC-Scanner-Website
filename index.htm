<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Sal BioSensor Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Sal BioSensor Monitor</h1>

<p class="subtitle">Scan NFC biosensor</p>

<button onclick="simulateNFC()">Simulate Reading</button>

<button onclick="downloadCSV()">Download CSV</button>

<div class="result">

<h2>Current Reading</h2>

<p id="sensorValue">Waiting for scan...</p>

</div>

<h2>Stored Readings</h2>

<ul id="historyList"></ul>

</div> -->

<div class="graph">

<h2>Real-Time Sensor Graph</h2>

<canvas id="sensorChart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
